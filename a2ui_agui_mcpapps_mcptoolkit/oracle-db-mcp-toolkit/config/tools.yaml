# Compatible with Oracle Database MCP Java Toolkit 1.0.0.
# Credentials are resolved from the child process environment, not stored here.
dataSources:
  financial-db:
    url: ${DB_URL}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}

tools:
  find-at-risk-customers:
    dataSource: financial-db
    description: Returns a bounded list of governed customer accounts at or above the requested risk score.
    parameters:
      - name: minimumRisk
        type: number
        description: Minimum risk score from 0 through 100.
        required: true
      - name: maximumRows
        type: integer
        description: Maximum number of rows from 1 through 50; validated by the agent service.
        required: true
    statement: >-
      SELECT * FROM (
        SELECT customer_id, customer_name, industry, account_value,
               risk_score, risk_level, risk_summary, owner_name,
               follow_up_status
          FROM account_risk_summary_v
         WHERE risk_score >= :minimumRisk
         ORDER BY risk_score DESC
      ) WHERE ROWNUM <= :maximumRows

  get-customer-risk-details:
    dataSource: financial-db
    description: Returns one governed account and its recent risk events.
    parameters:
      - name: customerId
        type: integer
        description: Customer account identifier.
        required: true
    statement: >-
      SELECT a.customer_id, a.customer_name, a.industry, a.account_value,
             a.risk_score, a.risk_level, a.risk_summary, a.owner_name,
             a.follow_up_status, e.event_id, e.event_type,
             e.event_description, e.event_date, e.severity
        FROM account_risk_summary_v a
        LEFT JOIN account_risk_event_v e ON e.customer_id = a.customer_id
       WHERE a.customer_id = :customerId
       ORDER BY e.event_date DESC

  reserve-customer-action-id:
    dataSource: financial-db
    description: Reserves one database-generated identifier for an approved customer follow-up action.
    parameters: []
    statement: SELECT customer_action_mcp_seq.NEXTVAL AS action_id FROM dual

  create-customer-follow-up:
    dataSource: financial-db
    description: Executes one validated and audited customer follow-up through a dedicated stored procedure.
    parameters:
      - name: actionId
        type: integer
        description: Identifier previously reserved with reserve-customer-action-id.
        required: true
      - name: customerId
        type: integer
        description: Customer account identifier from the governed result set.
        required: true
      - name: actionType
        type: string
        description: Allowlisted follow-up action type.
        required: true
      - name: actionNotes
        type: string
        description: Human-supplied approval notes containing 3 through 2000 characters.
        required: true
      - name: requestedBy
        type: string
        description: Authenticated actor recorded for auditing.
        required: true
    statement: >-
      BEGIN
        create_customer_follow_up_mcp(:actionId, :customerId, :actionType, :actionNotes, :requestedBy);
      END;

  count-customer-actions:
    dataSource: financial-db
    description: Returns the number of audited customer follow-up actions for verification.
    parameters: []
    statement: SELECT COUNT(*) AS action_count FROM customer_actions

toolsets:
  account-risk-read: [find-at-risk-customers, get-customer-risk-details]
  account-risk:
    - find-at-risk-customers
    - get-customer-risk-details
    - reserve-customer-action-id
    - create-customer-follow-up
    - count-customer-actions
