<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Protocol responsibility map for MCP, A2A, AG-UI, A2UI, and MCP Apps</title>
  <desc id="desc">A user-facing agentic application communicates with a Java agent backend through AG-UI. A2UI renders native controls and MCP Apps renders a sandboxed dashboard. MCP connects the backend to tools, while A2A connects it to other agents. The backend calls the Oracle Database MCP Java Toolkit, which reaches Oracle AI Database. A2A is conceptual and is not implemented in this demo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9fafb"/>
      <stop offset="1" stop-color="#eef3f7"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c74634"/>
      <stop offset="1" stop-color="#9d3025"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#1776a5"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#c74634"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#7652a2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1f2933" flood-opacity=".14"/>
    </filter>
    <style>
      .title { font: 750 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#1f2933; }
      .heading { font: 750 23px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#1f2933; }
      .label { font: 700 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#1f2933; }
      .body { font: 500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#4b5563; }
      .micro { font: 750 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; letter-spacing:1px; fill:#66717d; }
      .box { fill:#fff; stroke:#d1d8df; stroke-width:2; }
      .pill { fill:#111820; }
      .pillText { font: 800 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; fill:#fff; }
      .blueFlow { fill:none; stroke:#1776a5; stroke-width:4; marker-end:url(#arrowBlue); }
      .redFlow { fill:none; stroke:#c74634; stroke-width:4; marker-end:url(#arrowRed); }
      .purpleFlow { fill:none; stroke:#7652a2; stroke-width:4; marker-end:url(#arrowPurple); stroke-dasharray:9 8; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <circle cx="1305" cy="55" r="185" fill="#2f9d67" opacity=".10"/>
  <circle cx="65" cy="845" r="210" fill="#c74634" opacity=".08"/>
  <text x="700" y="58" text-anchor="middle" class="title">Which protocol connects which responsibility?</text>

  <g filter="url(#shadow)">
    <rect x="390" y="95" width="620" height="230" rx="28" class="box"/>
    <text x="700" y="135" text-anchor="middle" class="micro">USER-FACING AGENTIC APPLICATION</text>
    <rect x="425" y="162" width="255" height="118" rx="18" fill="#eef7fb" stroke="#8ec9df" stroke-width="2"/>
    <text x="552" y="201" text-anchor="middle" class="heading">A2UI</text>
    <text x="552" y="232" text-anchor="middle" class="body">Declarative native UI</text>
    <text x="552" y="257" text-anchor="middle" class="body">cards · forms · approval</text>
    <rect x="720" y="162" width="255" height="118" rx="18" fill="#f4eef9" stroke="#b9a0d1" stroke-width="2"/>
    <text x="847" y="201" text-anchor="middle" class="heading">MCP Apps</text>
    <text x="847" y="232" text-anchor="middle" class="body">Sandboxed rich UI</text>
    <text x="847" y="257" text-anchor="middle" class="body">dashboard · host bridge</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="485" y="520" width="430" height="190" rx="26" fill="url(#agent)"/>
    <text x="700" y="570" text-anchor="middle" class="micro" style="fill:#ffd7cf">AGENT BACKEND</text>
    <text x="700" y="612" text-anchor="middle" class="heading" style="fill:#fff">Java agent and orchestration service</text>
    <text x="700" y="648" text-anchor="middle" class="body" style="fill:#fff">run · policy · approval · MCP client</text>
    <text x="700" y="679" text-anchor="middle" class="body" style="fill:#fff">Oracle Database MCP Java Toolkit</text>
  </g>

  <path d="M700 325 L700 505" class="redFlow"/>
  <rect x="566" y="378" width="268" height="56" rx="28" fill="#fff" stroke="#c74634" stroke-width="2"/>
  <text x="700" y="401" text-anchor="middle" class="label">AG-UI</text>
  <text x="700" y="422" text-anchor="middle" class="body">agent ↔ frontend events and state</text>

  <g filter="url(#shadow)">
    <rect x="70" y="430" width="270" height="175" rx="24" class="box"/>
    <circle cx="205" cy="482" r="26" fill="#1776a5" opacity=".14"/>
    <path d="M193 482h24M205 470v24" stroke="#1776a5" stroke-width="7" stroke-linecap="round"/>
    <text x="205" y="535" text-anchor="middle" class="heading">Tools</text>
    <text x="205" y="565" text-anchor="middle" class="body">database · APIs · services</text>
  </g>
  <path d="M340 520 C405 520 424 585 470 585" class="blueFlow"/>
  <rect x="335" y="478" width="235" height="52" rx="26" class="pill"/>
  <text x="452" y="511" text-anchor="middle" class="pillText">MCP · agent ↔ tools</text>

  <g filter="url(#shadow)">
    <rect x="1060" y="430" width="270" height="175" rx="24" class="box"/>
    <rect x="1170" y="458" width="50" height="46" rx="12" fill="#7652a2" opacity=".16"/>
    <circle cx="1183" cy="479" r="5" fill="#7652a2"/><circle cx="1207" cy="479" r="5" fill="#7652a2"/>
    <path d="M1184 493 Q1195 501 1206 493" fill="none" stroke="#7652a2" stroke-width="4" stroke-linecap="round"/>
    <text x="1195" y="535" text-anchor="middle" class="heading">Other agents</text>
    <text x="1195" y="565" text-anchor="middle" class="body">specialists · remote systems</text>
  </g>
  <path d="M1060 520 C995 520 976 585 930 585" class="purpleFlow"/>
  <rect x="830" y="478" width="235" height="52" rx="26" class="pill"/>
  <text x="947" y="511" text-anchor="middle" class="pillText">A2A · agent ↔ agent</text>
  <text x="1195" y="631" text-anchor="middle" class="micro" fill="#7652a2">CONCEPTUAL · NOT IMPLEMENTED HERE</text>

  <g filter="url(#shadow)">
    <path d="M510 782 h380 v55 c0 32-85 58-190 58s-190-26-190-58z" fill="#202b35" stroke="#556473" stroke-width="2"/>
    <ellipse cx="700" cy="782" rx="190" ry="50" fill="#344350" stroke="#778796" stroke-width="2"/>
    <text x="700" y="790" text-anchor="middle" class="heading" style="fill:#fff">Oracle AI Database</text>
    <text x="700" y="842" text-anchor="middle" class="body" style="fill:#d8dee6">governed data · vectors · transactions · auditing</text>
  </g>
  <path d="M700 710 L700 728" class="redFlow"/>
</svg>
